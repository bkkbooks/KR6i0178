body:
  text: 罽賓國三藏般若共利言譯如是我聞一時薄伽梵在室羅筏悉底國逝多林給孤獨園時大花嚴長者從坐而起整理衣服長跪合掌而白佛言大德世尊一切有情施飲食者當得何報爾時薄伽梵告長者言若施食者得如來力時大長者復白佛言世尊其如來力頗有譬喻而能宣說令我聞不佛告長者言有善男子不可以少因緣而能說之復告長者如十凡牛力等一犎牛力十犎牛力等一犀牛力十犀牛力等一凡象力十凡象力等一設臘婆力形如䴥面似犀牛身有八脚四在背上四踞地行下足若困翻上憩令上足下履地而行力能負象十設臘婆力等一鬪戰象力十鬪戰象力等一醉象力十醉象力等一野象力十野象力等一羯嚟耨迦象力十羯嚟耨迦象力等一拘牟頭花象力十拘牟頭花象力等一嗢鉢羅花象力十嗢鉢羅花象力等一寧盧鉢羅象力十寧盧鉢羅象力等一大香象力十大香象力等一五色師子王力十師子王力等一人中力士力十力士力等一諾拘羅力十諾拘羅力等一遏主那力十遏主那力等一毘摩細那力十毘摩細那力等一那羅延力六百六十三那羅延力等佛世尊一毛孔力八萬四千毛孔之中一一皆具如是那羅延力八萬四千毛孔之力等薄伽梵一節之力佛告長者以是當知諸佛如來一一節中皆具八萬四千六百六十三種那羅延力佛說此經已大花嚴長者聞佛所說歡喜奉行
